<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>⚔️ 网页1v1格斗游戏</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .screen { display: none; }
    .screen.active { display: flex; align-items: center; justify-content: center; }
    .container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 900px;
      width: 100%;
      text-align: center;
    }
    h1 { color: #667eea; margin-bottom: 20px; font-size: 40px; }
    p { color: #666; margin-bottom: 20px; font-size: 16px; }
    input { 
      padding: 12px; 
      font-size: 16px; 
      border: 2px solid #667eea; 
      border-radius: 8px; 
      margin: 10px auto;
      width: 100%;
      max-width: 400px;
      display: block;
    }
    .hero-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 15px;
      margin: 30px 0;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    .hero-btn {
      padding: 15px 10px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: 3px solid transparent;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 14px;
      font-weight: bold;
    }
    .hero-btn:hover { 
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    .hero-btn.selected { 
      border-color: #ffd700; 
      box-shadow: 0 0 20px rgba(255,215,0,0.6); 
    }
    .btn {
      padding: 15px 40px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin: 10px;
      transition: all 0.3s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }
    .btn-primary:hover:not(:disabled) { 
      transform: scale(1.05);
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    .btn-primary:disabled { 
      opacity: 0.5; 
      cursor: not-allowed; 
    }
    .btn-secondary { 
      background: #e74c3c; 
      color: white; 
    }
    .btn-secondary:hover { 
      background: #c0392b;
    }
    .spinner {
      width: 60px;
      height: 60px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 30px auto;
    }
    @keyframes spin { 
      0% { transform: rotate(0deg); } 
      100% { transform: rotate(360deg); } 
    }
    canvas { 
      display: block; 
      margin: 20px auto; 
      background: #ecf0f1; 
      border: 3px solid #333; 
      border-radius: 10px;
      max-width: 100%;
      height: auto;
    }
    .game-info { 
      display: flex; 
      justify-content: space-around; 
      align-items: center;
      margin: 20px 0; 
      flex-wrap: wrap;
    }
    .player-info {
      flex: 1;
      min-width: 200px;
    }
    .health-bar { 
      width: 200px; 
      height: 20px; 
      background: #ddd; 
      border-radius: 10px; 
      overflow: hidden; 
      margin: 8px auto;
      border: 2px solid #333;
    }
    .health-fill { 
      height: 100%; 
      background: linear-gradient(90deg, #e74c3c, #27ae60); 
      width: 100%;
      transition: width 0.3s;
    }
  </style>
</head>
<body>

<div id="lobby" class="screen active">
  <div class="container">
    <h1>⚔️ 网页1v1格斗游戏</h1>
    <p>与全球玩家实时对战！</p>
    <input id="playerName" placeholder="输入你的昵称" maxlength="10">
    <p style="margin-top: 30px; font-weight: bold; color: #333;">选择你的英雄：</p>
    <div id="heroList" class="hero-grid"></div>
    <button id="joinBtn" class="btn btn-primary" disabled onclick="joinGame()">进入竞技场</button>
  </div>
</div>

<div id="waiting" class="screen">
  <div class="container">
    <h2>🔍 寻找对手中...</h2>
    <div class="spinner"></div>
    <p>等待对手进入房间</p>
    <button class="btn btn-secondary" onclick="cancelQueue()">返回大厅</button>
  </div>
</div>

<div id="battle" class="screen">
  <div class="container">
    <div class="game-info">
      <div class="player-info">
        <div id="player1Name" style="font-weight: bold; color: #667eea; font-size: 16px;"></div>
        <div class="health-bar"><div id="health1" class="health-fill"></div></div>
        <div style="font-size: 14px; color: #666;">HP: <span id="hp1">100</span></div>
      </div>
      <div style="font-size: 28px; font-weight: bold; color: #e74c3c;">VS</div>
      <div class="player-info">
        <div id="player2Name" style="font-weight: bold; color: #764ba2; font-size: 16px;"></div>
        <div class="health-bar"><div id="health2" class="health-fill"></div></div>
        <div style="font-size: 14px; color: #666;">HP: <span id="hp2">100</span></div>
      </div>
    </div>
    <canvas id="battleCanvas" width="800" height="400"></canvas>
    <p style="margin-top: 20px; color: #333;"><strong>操作：</strong>← → 移动 | ↑ 跳跃 | 空格 攻击 | Ctrl 技能</p>
    <button class="btn btn-secondary" onclick="surrender()">投降</button>
  </div>
</div>

<div id="result" class="screen">
  <div class="container">
    <h2 id="resultTitle" style="font-size: 48px; margin-bottom: 30px;"></h2>
    <p id="resultDetail" style="font-size: 18px; color: #666; margin-bottom: 30px;"></p>
    <button class="btn btn-primary" onclick="location.reload()">重新开始</button>
  </div>
</div>

<script>
// Firebase 配置
const firebaseConfig = {
  apiKey: "AIzaSyClPWDNsJXUerSS6YGfMsir1H3KAut1gtE",
  authDomain: "game-d7e6d.firebaseapp.com",
  databaseURL: "https://game-d7e6d-default-rtdb.firebaseio.com",
  projectId: "game-d7e6d",
  storageBucket: "game-d7e6d.firebasestorage.app",
  messagingSenderId: "852429976571",
  appId: "1:852429976571:web:9d3a79153361264278915e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 英雄定义
const HEROES = {
  'sword': { name: '⚔️ 剑客', hp: 100, damage: 16, speed: 7 },
  'knight': { name: '🛡️ 重骑', hp: 140, damage: 12, speed: 5 },
  'pyro': { name: '🔥 火法', hp: 90, damage: 18, speed: 6 },
  'frost': { name: '❄️ 冰法', hp: 90, damage: 13, speed: 6 },
  'bolt': { name: '⚡ 雷电', hp: 85, damage: 22, speed: 7 },
  'assassin': { name: '🗡️ 刺客', hp: 70, damage: 21, speed: 10 },
  'druid': { name: '🌿 自然', hp: 110, damage: 11, speed: 5 },
  'beast': { name: '👹 怪兽', hp: 120, damage: 14, speed: 6 }
};

// 游戏状态
let gameState = {
  playerName: '',
  selectedHero: 'sword',
  playerNumber: 0,
  roomId: '',
  myHP: 100,
  oppoHP: 100,
  gameActive: false,
  opponentName: '对手'
};

function el(id) { 
  return document.getElementById(id); 
}

function show(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  el(screenId).classList.add('active');
}

// 初始化英雄列表
function initHeroes() {
  let html = '';
  for (let [key, hero] of Object.entries(HEROES)) {
    html += `<button class="hero-btn" onclick="selectHero('${key}')" id="hero_${key}">
      <div>${hero.name}</div>
      <div style="font-size: 12px; margin-top: 5px;">HP: ${hero.hp} ATK: ${hero.damage}</div>
    </button>`;
  }
  el('heroList').innerHTML = html;
  selectHero('sword');
}

function selectHero(heroKey) {
  gameState.selectedHero = heroKey;
  document.querySelectorAll('.hero-btn').forEach(btn => btn.classList.remove('selected'));
  el('hero_' + heroKey).classList.add('selected');
  checkJoinBtn();
}

function checkJoinBtn() {
  const hasName = el('playerName').value.trim().length > 0;
  el('joinBtn').disabled = !hasName;
}

el('playerName').addEventListener('input', checkJoinBtn);

// 生成房间ID
function genRoomId() {
  return Math.random().toString(36).substr(2, 9) + '_' + Date.now();
}

// 加入游戏
async function joinGame() {
  gameState.playerName = el('playerName').value.trim();
  if (!gameState.playerName) {
    alert('请输入昵称！');
    return;
  }
  
  show('waiting');
  
  try {
    const queueRef = db.ref('matchmaking/queue');
    const snapshot = await queueRef.once('value');
    const queue = snapshot.val() || [];
    
    console.log('当前队列:', queue);
    
    if (queue.length > 0) {
      // 有人等待，加入对战
      gameState.roomId = queue[0].roomId;
      gameState.playerNumber = 2;
      gameState.opponentName = queue[0].name;
      
      // 更新房间，添加第二��玩家
      const myHero = HEROES[gameState.selectedHero];
      await db.ref('rooms/' + gameState.roomId).update({
        player2: {
          name: gameState.playerName,
          hero: gameState.selectedHero,
          hp: myHero.hp
        },
        ready: true
      });
      
      // 从队列移除
      await queueRef.set(queue.slice(1));
      
      console.log('加入房间:', gameState.roomId);
      setTimeout(startGame, 800);
    } else {
      // 没人等待，创建房间
      gameState.roomId = genRoomId();
      gameState.playerNumber = 1;
      
      const myHero = HEROES[gameState.selectedHero];
      await db.ref('rooms/' + gameState.roomId).set({
        roomId: gameState.roomId,
        player1: {
          name: gameState.playerName,
          hero: gameState.selectedHero,
          hp: myHero.hp
        },
        player2: null,
        ready: false,
        createdAt: Date.now()
      });
      
      // 加入队列
      await queueRef.set([...queue, { roomId: gameState.roomId, name: gameState.playerName }]);
      
      console.log('创建房间:', gameState.roomId);
      waitForPlayer2();
    }
  } catch (error) {
    console.error('配对错误:', error);
    alert('连接出错，请重试: ' + error.message);
    show('lobby');
  }
    
    if (gameState.playerNumber === 1) {
      // 第一个玩家，等待第二个玩家
      waitForPlayer2();
    } else {
      // 第二个玩家，立即开始游戏
      setTimeout(startGame, 500);
    }
  } catch (error) {
    console.error('配对错误:', error);
    alert('连接出错，请重试');
    show('lobby');
  }
}

function waitForPlayer2() {
  const roomRef = db.ref('rooms/' + gameState.roomId);
  const timeout = setTimeout(() => {
    alert('等待超时，返回大厅');
    cancelQueue();
  }, 60000); // 60秒超时
  
  roomRef.on('value', snap => {
    if (snap.exists() && snap.val().player2) {
      clearTimeout(timeout);
      roomRef.off();
      setTimeout(startGame, 500);
    }
  });
}

function cancelQueue() {
  const queueRef = db.ref('matchmaking/queue');
  queueRef.once('value', snap => {
    let queue = snap.val() || [];
    queue = queue.filter(item => item.roomId !== gameState.roomId);
    queueRef.set(queue.length > 0 ? queue : null);
  });
  show('lobby');
}

function startGame() {
  show('battle');
  gameState.gameActive = true;
  
  const myHero = HEROES[gameState.selectedHero];
  gameState.myHP = myHero.hp;
  gameState.oppoHP = myHero.hp;
  
  // 更新UI
  const playerNum = gameState.playerNumber === 1 ? 'player1' : 'player2';
  el(playerNum + 'Name').textContent = gameState.playerName + ' ' + myHero.name;
  
  const oppoNum = gameState.playerNumber === 1 ? 'player2' : 'player1';
  el(oppoNum + 'Name').textContent = gameState.opponentName || '对手';
  
  updateHealthBars();
  gameLoop();
  
  // 键盘控制
  document.onkeydown = handleKeyDown;
}

function handleKeyDown(e) {
  if (!gameState.gameActive) return;
  
  const myHero = HEROES[gameState.selectedHero];
  
  if (e.key === ' ') {
    e.preventDefault();
    // 攻击
    gameState.oppoHP -= myHero.damage;
    if (gameState.oppoHP <= 0) endGame(true);
    updateHealthBars();
  }
  if (e.key === 'Control') {
    e.preventDefault();
    // 技能攻击
    gameState.oppoHP -= myHero.damage * 1.5;
    if (gameState.oppoHP <= 0) endGame(true);
    updateHealthBars();
  }
}

function updateHealthBars() {
  const myHero = HEROES[gameState.selectedHero];
  const healthPercent1 = Math.max(0, gameState.myHP / myHero.hp * 100);
  const healthPercent2 = Math.max(0, gameState.oppoHP / myHero.hp * 100);
  
  el('health1').style.width = healthPercent1 + '%';
  el('health2').style.width = healthPercent2 + '%';
  el('hp1').textContent = Math.max(0, Math.floor(gameState.myHP));
  el('hp2').textContent = Math.max(0, Math.floor(gameState.oppoHP));
}

function gameLoop() {
  if (!gameState.gameActive) return;
  
  updateHealthBars();
  drawBattle();
  
  requestAnimationFrame(gameLoop);
}

function drawBattle() {
  const canvas = el('battleCanvas');
  const ctx = canvas.getContext('2d');
  
  // 清空画布
  ctx.fillStyle = '#ecf0f1';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // 地面
  ctx.fillStyle = '#bdc3c7';
  ctx.fillRect(0, canvas.height - 80, canvas.width, 80);
  
  // 玩家1
  ctx.fillStyle = '#3498db';
  ctx.fillRect(100, canvas.height - 180, 60, 100);
  ctx.font = '40px Arial';
  ctx.fillStyle = '#fff';
  ctx.fillText('P1', 115, canvas.height - 140);
  
  // 玩家2
  ctx.fillStyle = '#e74c3c';
  ctx.fillRect(canvas.width - 160, canvas.height - 180, 60, 100);
  ctx.fillText('P2', canvas.width - 145, canvas.height - 140);
  
  // 提示文字
  ctx.font = '14px Arial';
  ctx.fillStyle = '#333';
  ctx.fillText('空格 攻击 | Ctrl 技能', 20, 30);
}

function endGame(isWin) {
  gameState.gameActive = false;
  document.onkeydown = null;
  
  el('resultTitle').textContent = isWin ? '🎉 你赢了！' : '😔 你输了';
  el('resultDetail').innerHTML = `<strong>${gameState.playerName}</strong> vs <strong>${gameState.opponentName}</strong><br>你的血量: ${Math.max(0, Math.floor(gameState.myHP))} | 对手血量: ${Math.max(0, Math.floor(gameState.oppoHP))}`;
  
  show('result');
  
  // 清理Firebase
  db.ref('rooms/' + gameState.roomId).remove();
}

function surrender() {
  endGame(false);
}

// 初始化
initHeroes();
</script>

</body>
</html>
